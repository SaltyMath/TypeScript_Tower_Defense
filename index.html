<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanilla TypeScript Tower Defense</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #111;
      color: #f0f0f0;
    }
    #gameCanvas {
      border: 2px solid #444;
      margin-top: 1rem;
      background: #08121c;
    }
    .instructions {
      max-width: 760px;
      padding: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="instructions">
    <h1>Vanilla TypeScript Tower Defense</h1>
    <p>Click on the game field to place towers. Enemies move from left to right and towers fire automatically.</p>
  </div>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script type="module" src="./dist/main.js"></script>
</body>
</html>
